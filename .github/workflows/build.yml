name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  EXODUS_REPO: OmbraRD/Exodus
  EXODUS_BRANCH: next

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    steps:
      - name: Checkout MCP extension
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -match '^refs/tags/v(.+)$') {
            $version = $Matches[1]
          } else {
            $version = ""
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "IS_RELEASE=$( if ($version) { 'true' } else { 'false' } )" >> $env:GITHUB_OUTPUT
          echo "Building version: $( if ($version) { $version } else { '(default from source)' } )"

      - name: Checkout Exodus
        uses: actions/checkout@v4
        with:
          repository: ${{ env.EXODUS_REPO }}
          ref: ${{ env.EXODUS_BRANCH }}
          path: Exodus
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Exodus third-party libraries
        run: |
          msbuild Exodus\ThirdPartyLibraries.sln `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /m

      - name: Build Exodus SDK libraries
        run: |
          msbuild Exodus\Exodus.sln `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /m

      - name: Build ExodusMCP extension
        run: |
          msbuild ExodusMCP.vcxproj `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:ExodusDir=${{ github.workspace }}\Exodus\ `
            /p:MCPVersion=${{ steps.version.outputs.VERSION }} `
            /m

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExodusMCP-${{ matrix.platform }}-${{ matrix.configuration }}
          path: |
            bin/${{ matrix.configuration }}/ExodusMCP.dll
            README.md

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ExodusMCP-x64-Release
          path: dist

      - name: Package release zip
        run: |
          cd dist
          zip -r ../ExodusMCP-${{ github.ref_name }}.zip ExodusMCP.dll README.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ExodusMCP-${{ github.ref_name }}.zip
